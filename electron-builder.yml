appId: com.claudedash.app
productName: Claude Dash
copyright: Copyright © 2026 Claude Dash

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - "!src/**/*.test.*"
  - "!tests/**"
  - "!scripts/**"

# ── macOS ──────────────────────────────────────────────

mac:
  category: public.app-category.utilities
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  darkModeSupport: true
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: true

dmg:
  background: assets/dmg-background.png
  icon: assets/icon.icns
  iconSize: 100
  window:
    width: 600
    height: 400
  contents:
    - x: 170
      y: 180
      type: file
    - x: 430
      y: 180
      type: link
      path: /Applications

# ── Windows ────────────────────────────────────────────

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  installerIcon: assets/icon.png
  uninstallerIcon: assets/icon.png
  installerHeaderIcon: assets/icon.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Claude Dash

# ── Linux ──────────────────────────────────────────────

linux:
  icon: assets/icon.png
  category: Utility
  synopsis: Monitor Claude usage limits in real-time
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

# ── Publish (GitHub Releases) ──────────────────────────

publish:
  provider: github
  releaseType: release
