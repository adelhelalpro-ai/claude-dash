<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Dash</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">

    <!-- ── Custom Title Bar ── -->
    <div class="title-bar" id="title-bar">
      <div class="title-bar-left">
        <svg class="title-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="rgba(139,92,246,0.7)" stroke-width="1.5" fill="rgba(139,92,246,0.15)"/>
          <circle cx="8" cy="8" r="3" fill="rgba(139,92,246,0.6)"/>
        </svg>
        <span class="title-text">Claude Dash</span>
      </div>
      <div class="title-bar-controls">
        <button class="ctrl-btn minimize" id="btn-minimize" title="Minimize">
          <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" rx="0.5" fill="currentColor"/></svg>
        </button>
        <button class="ctrl-btn close" id="btn-close" title="Close">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- ── Login Screen ── -->
    <div class="screen" id="screen-login">
      <div class="login-content">
        <div class="login-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="url(#grad1)" stroke-width="2" fill="rgba(139,92,246,0.08)"/>
            <circle cx="32" cy="32" r="16" stroke="url(#grad1)" stroke-width="1.5" fill="rgba(139,92,246,0.05)" opacity="0.7"/>
            <circle cx="32" cy="32" r="6" fill="url(#grad1)" opacity="0.8"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#8B5CF6"/>
                <stop offset="100%" stop-color="#6D28D9"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">Claude Dash</h1>
        <p class="login-subtitle">Monitor your Claude usage limits in real-time</p>
        <button class="btn-connect" id="btn-connect">
          <span class="btn-text">Connect to Claude</span>
          <span class="btn-loader hidden" id="btn-loader">
            <svg class="spinner" width="18" height="18" viewBox="0 0 18 18">
              <circle cx="9" cy="9" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
              <path d="M9 2a7 7 0 0 1 7 7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </span>
        </button>
        <p class="login-error hidden" id="login-error"></p>
        <p class="login-hint">Opens Claude login in your browser</p>
      </div>
    </div>

    <!-- ── Dashboard ── -->
    <div class="screen hidden" id="screen-dashboard">
      <!-- User bar -->
      <div class="user-bar">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">C</div>
          <span class="user-email" id="user-email">--</span>
        </div>
        <button class="btn-text-action" id="btn-logout">Disconnect</button>
      </div>

      <!-- Limits container -->
      <div class="limits-container" id="limits-container">
        <div class="empty-state" id="empty-state">
          <div class="pulse-dot"></div>
          <p>Fetching usage data...</p>
        </div>
      </div>

      <!-- Extra usage badge -->
      <div class="extra-badge hidden" id="extra-badge">
        <span class="extra-dot"></span>
        <span id="extra-text">Extra usage: Off</span>
      </div>

      <!-- Footer -->
      <div class="dashboard-footer">
        <span class="footer-status" id="footer-status">Connecting...</span>
        <button class="btn-refresh" id="btn-refresh" title="Refresh now">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M12 7a5 5 0 1 1-1.5-3.5M12 2v3.5H8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Error overlay ── -->
    <div class="error-overlay hidden" id="error-overlay">
      <div class="error-content">
        <p id="error-message">Connection lost</p>
        <button class="btn-retry" id="btn-retry">Retry</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
